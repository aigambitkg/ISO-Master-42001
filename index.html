<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIMS Starter Kit · ISO 42001</title>
  <meta name="description" content="ISO/IEC 42001 Implementation Toolkit für Startups – AI Policy, Controls, Impact Assessments und Repo-Export in einer statischen App." />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Markdown + ZIP via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <style>
    :root { color-scheme: light; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .tabular-nums { font-variant-numeric: tabular-nums; }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
    *::-webkit-scrollbar-track { background: transparent; }

    .progress-bar { transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* Prose styling for Markdown preview */
    .prose { color: #0f172a; line-height: 1.7; max-width: none; }
    .prose h1 { font-size: 1.875rem; font-weight: 600; margin: 1.5rem 0 1rem; letter-spacing: -0.02em; }
    .prose h2 { font-size: 1.375rem; font-weight: 600; margin: 2rem 0 0.75rem; letter-spacing: -0.01em; }
    .prose h3 { font-size: 1.125rem; font-weight: 600; margin: 1.5rem 0 0.5rem; }
    .prose p  { margin: 0.75rem 0; }
    .prose ul { margin: 0.5rem 0 0.75rem 1.5rem; list-style: disc; }
    .prose ol { margin: 0.5rem 0 0.75rem 1.5rem; list-style: decimal; }
    .prose li { margin: 0.25rem 0; }
    .prose table { border-collapse: collapse; margin: 1rem 0; font-size: 0.875rem; }
    .prose th, .prose td { border: 1px solid #e2e8f0; padding: 0.5rem 0.75rem; text-align: left; }
    .prose th { background: #f8fafc; font-weight: 600; }
    .prose code { background: #f1f5f9; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875em; font-family: 'JetBrains Mono', monospace; }
    .prose hr { border: 0; border-top: 1px solid #e2e8f0; margin: 1.5rem 0; }
    .prose strong { font-weight: 600; }

    /* Highlight unresolved template variables in preview */
    .var-token { background: #fef3c7; color: #92400e; padding: 0.05rem 0.3rem; border-radius: 0.25rem; font-family: 'JetBrains Mono', monospace; font-size: 0.85em; font-weight: 500; }
    .var-resolved { background: #ecfdf5; color: #047857; padding: 0.05rem 0.3rem; border-radius: 0.25rem; font-weight: 500; }

    /* Toast */
    .toast { animation: toastIn 0.2s ease-out, toastOut 0.2s ease-in 2.8s forwards; }
    @keyframes toastIn  { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes toastOut { to { transform: translateY(8px); opacity: 0; } }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased min-h-screen">

  <!-- App Shell: Sidebar + Main -->
  <div class="flex min-h-screen">

    <!-- Sidebar (rendered by sidebar.js) -->
    <aside id="sidebar" class="w-72 border-r border-slate-200/70 bg-white sticky top-0 h-screen flex-shrink-0 hidden lg:flex flex-col"></aside>

    <!-- Mobile Header -->
    <div class="lg:hidden fixed top-0 left-0 right-0 bg-white border-b border-slate-200/70 z-40 px-4 h-14 flex items-center justify-between">
      <button id="mobile-menu-btn" aria-label="Menü" class="p-2 -ml-2 rounded-lg hover:bg-slate-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>
      <span class="text-sm font-semibold tracking-tight">AIMS Starter Kit</span>
      <span class="w-7"></span>
    </div>

    <!-- Mobile Sidebar Overlay -->
    <div id="mobile-overlay" class="lg:hidden fixed inset-0 bg-slate-900/50 z-40 hidden"></div>
    <aside id="mobile-sidebar" class="lg:hidden fixed top-0 left-0 bottom-0 w-72 bg-white border-r border-slate-200/70 z-50 hidden flex-col"></aside>

    <!-- Main Content Area -->
    <main id="main" class="flex-1 min-w-0 lg:py-10 lg:px-12 px-4 pt-20 pb-16 max-w-7xl mx-auto w-full"></main>

  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2 pointer-events-none"></div>

  <!-- Boot the App -->
  <script type="module" src="./js/app.js"></script>

</body>
</html>
